#
# GitHub Actions workflow for continuous integration (CI).
#
# Responsibilities
# - Run slower post-merge validation after the PR-gate workflow succeeds on
#   protected or release-oriented GitFlow branches.
# - Build non-PR docs targets, cross-platform install smoke coverage, and
#   packaged distribution validation.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
# - Keep required pull-request and merge-queue gates in `pr.yml`.
# - This workflow intentionally complements, rather than replaces, the lighter
#   integration checks that run earlier in the development loop.

---

name: CI

on:
  workflow_run:
    workflows: ["PR Gates"]
    types: [completed]
    branches:
      # Protected and release-oriented GitFlow branches
      - main
      - develop
      - '**/release/**'
      - '**/hotfix/**'
  workflow_dispatch:

permissions: {}

jobs:
  document:
    name: Build docs (${{ matrix.builder }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    strategy:
      matrix:
        builder: [epub, linkcheck]
    permissions: &permissions_read
      contents: read
    steps:
      - &checkout_step
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: "-e .[docs]"
      - uses: ./.github/actions/sphinx-build
        with:
          builder: ${{ matrix.builder }}

  smoke-cross-platform:
    name: Smoke install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    permissions: *permissions_read
    steps:
      - *checkout_step
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: '.'
      - name: Verify CLI entrypoint
        shell: bash
        run: |
          python -m etlplus --version
          etlplus --version

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    needs: [document, smoke-cross-platform]
    permissions: *permissions_read
    steps:
      - *checkout_step
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: "build twine"
      - uses: ./.github/actions/build-and-verify-dist
      - uses: ./.github/actions/wheel-smoke
      - name: Upload distributions
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # Pinned v7.0.0
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error
