#
# A GitHub Actions workflow configuration file for Continuous Integration (CI).
#
# Notes
# - The workflow includes jobs for linting, testing, building distributions,
#   and publishing releases to GitHub and PyPI.
# - The workflow is hardened by removing global permissions and setting per-job
#   scopes.
# - To harden workflow security, global permissions are absent, and per-job
#   permissions are set as needed.
# - External GitHub Actions action references are each pinned to specific SHA
#   to limit supply-chain risk.

---

name: CI

on:
  push:
    branches:
      # GitFlow branches
      - main
      - develop
      - '**/feature/**'
      - '**/bugfix/**'
      - '**/release/**'
      - '**/hotfix/**'

      # Extended branches
      - '**/chore/**'
      - '**/ci/**'
      - '**/docs/**'
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, develop ]

permissions: {}

jobs:
  lint:
    name: Lint on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy: &python-matrix
      matrix:
        python-version: ['3.13', '3.14']
    permissions: &permissions_read
      contents: read
    steps:
      - &checkout_step
        name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # Pinned v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ matrix.python-version }}
          python-bootstrap: ".[dev]"
      - name: Ruff check
        run: |
          ruff version
          ruff check .
          # ruff format --check .
          files="$(git ls-files '*.py')"
          if [ -n "$files" ]; then
            autopep8 --diff --exit-code --max-line-length=79 $files
          fi

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy: *python-matrix
    permissions: *permissions_read
    steps:
      - *checkout_step
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ matrix.python-version }}
          python-bootstrap: "-e .[dev,file]"
      - name: Run fast meta guardrails
        run: |
          pytest -q \
            tests/unit/meta/test_u_test_layout.py \
            tests/unit/meta/test_u_test_filenames.py \
            tests/unit/meta/test_u_marker_coverage.py \
            tests/unit/meta/test_u_integration_file_conventions.py \
            tests/unit/meta/test_u_contract_readme.py
      - name: Run tests (with coverage)
        run: |
          pytest -q \
            --cov \
            --cov-branch \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            tests/

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # Pinned v5.5.2
        with:
          fail_ci_if_error: true
          files: coverage.xml
          flags: unit
          name: etlplus
          token: ${{ secrets.CODECOV_TOKEN }}  # Omit for public repo
          verbose: true

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    if: &release_tag_condition >
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/rc')
    needs: [lint, test]
    permissions: *permissions_read
    steps:
      - *checkout_step
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: build
      - name: Build distributions
        run: |
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # Pinned v4
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: *release_tag_condition
    needs: build
    permissions:
      contents: write
    steps:
      - *checkout_step
      - &download_dist_step
        name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # Pinned v4
        with:
          name: dist-artifacts
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # Pinned v2
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: *release_tag_condition
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/etlplus/
    steps:
      - *checkout_step
      - *download_dist_step
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # Pinned v1
        with:
          verbose: true

  document:
    name: Publish docs to Read the Docs
    runs-on: ubuntu-latest
    if: *release_tag_condition
    needs: publish
    permissions: {}
    steps:
      - name: Sync and trigger Read the Docs release build
        env:
          # Requires repo variable READTHEDOCS_PROJECT_SLUG and secret
          # READTHEDOCS_TOKEN.
          READTHEDOCS_PROJECT_SLUG: ${{ vars.READTHEDOCS_PROJECT_SLUG }}
          READTHEDOCS_TOKEN: ${{ secrets.READTHEDOCS_TOKEN }}
          READTHEDOCS_VERSION_SLUG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${READTHEDOCS_PROJECT_SLUG}" ]; then
            echo 'Missing repository variable READTHEDOCS_PROJECT_SLUG' >&2
            exit 1
          fi
          if [ -z "${READTHEDOCS_TOKEN}" ]; then
            echo 'Missing repository secret READTHEDOCS_TOKEN' >&2
            exit 1
          fi

          api_base="https://app.readthedocs.com/api/v3/projects/${READTHEDOCS_PROJECT_SLUG}"
          version_url="${api_base}/versions/${READTHEDOCS_VERSION_SLUG}/"
          auth_header="Authorization: Token ${READTHEDOCS_TOKEN}"

          curl --fail --silent --show-error \
            -X POST \
            -H "${auth_header}" \
            "${api_base}/sync-versions/"

          for attempt in $(seq 1 12); do
            status_code="$(
              curl --silent --show-error \
                --output /tmp/readthedocs-version.json \
                --write-out '%{http_code}' \
                -H "${auth_header}" \
                "${version_url}"
            )"
            if [ "${status_code}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 12 ]; then
              echo "Read the Docs version ${READTHEDOCS_VERSION_SLUG} was not available after sync." >&2
              if [ -s /tmp/readthedocs-version.json ]; then
                cat /tmp/readthedocs-version.json >&2
              fi
              exit 1
            fi
            sleep 5
          done

          if grep -q '"active":[[:space:]]*true' /tmp/readthedocs-version.json \
            && grep -q '"hidden":[[:space:]]*false' /tmp/readthedocs-version.json; then
            curl --fail --silent --show-error \
              -X POST \
              -H "${auth_header}" \
              "${version_url}builds/"
          else
            curl --fail --silent --show-error \
              -X PATCH \
              -H "${auth_header}" \
              -H 'Content-Type: application/json' \
              -d '{"active": true, "hidden": false}' \
              "${version_url}"
          fi
