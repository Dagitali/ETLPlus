#
# GitHub Actions workflow for continuous integration (CI).
#
# Responsibilities
# - Run pre-merge validation for pull requests targeting the long-lived GitFlow
#   branches.
# - Build non-HTML docs targets, cross-platform install smoke coverage, and
#   packaged distribution validation before those changes land.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
# - Keep required pull-request and merge-queue gates in `pr.yml`.
# - This workflow intentionally complements, rather than replaces, the lighter
#   integration checks that run earlier in the development loop.
# - The dynamic run name is part of the workflow contract: it should identify
#   the short-lived source branch and the long-running target branch for PR
#   review clarity.

---

name: CI

run-name: >-
  ${{
    github.event_name == 'pull_request' &&
    format('CI: {0} -> {1}', github.head_ref, github.base_ref) ||
    github.event_name == 'merge_group' &&
    format('CI: merge queue for {0}', github.ref_name) ||
    'CI: manual dispatch'
  }}

on:
  pull_request:
    branches:
      # Long-lived GitFlow branches
      - main
      - develop
  merge_group:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions: {}

env:
  DEFAULT_PYTHON_VERSION: '3.13'

jobs:
  document:
    name: Build docs (${{ matrix.builder }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        builder: [epub, linkcheck]
    permissions: &permissions_read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/build-docs-target
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          builder: ${{ matrix.builder }}

  smoke-cross-platform:
    name: Smoke install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          python-bootstrap: '.'
      - name: Verify CLI entrypoint
        shell: bash
        run: |
          python -m etlplus --version
          etlplus --version

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [document, smoke-cross-platform]
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/build-and-upload-dist
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
