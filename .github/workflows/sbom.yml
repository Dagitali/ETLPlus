#
# GitHub Actions workflow for Software Bill of Materials (SBOM) generation.
#
# Responsibilities
# - Generate a CycloneDX SBOM from the checked-out project environment.
# - Upload the generated SBOM as a workflow artifact for later inspection.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce
#   supply-chain risk.

---

name: SBOM

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions: {}

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: "."
      - name: Install SBOM generator
        run: |
          python -m pip install cyclonedx-bom
      - name: Generate SBOM
        run: |
          cyclonedx-py environment --output-format JSON --output-file sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # Pinned v7.0.0
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error
