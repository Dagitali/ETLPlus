# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# A GitHub Actions workflow configuration file for tagged release distribution.
#
# Notes
# - This workflow automates the tagged release path: build, artifact audit,
#   distribution validation, GitHub release publication, PyPI publication, and
#   versioned docs publication.
# - GitHub Release note categories are configured separately in
#   `.github/release.yml`.
# - The workflow is hardened by removing global permissions and setting per-job
#   scopes.
# - To harden workflow security, global permissions are absent, and per-job
#   permissions are set as needed.
# - External GitHub Actions action references are each pinned to specific SHA
#   to limit supply-chain risk.

---

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions: {}

jobs:
  build:
    name: Build tagged distributions
    runs-on: ubuntu-latest
    permissions: &permissions_read
      contents: read
    steps:
      - &checkout_step
        name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # Pinned v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: 'build twine'
      - name: Build distributions
        run: |
          python -m build
      - name: Audit release artifacts
        run: |
          python tools/check_release_artifacts.py dist/*
      - name: Validate distributions
        run: |
          python -m twine check dist/*
      - name: Smoke-test wheel install
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --upgrade pip
          .wheel-venv/bin/python -m pip install dist/*.whl
          .wheel-venv/bin/etlplus --version
      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # Pinned v4
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - *checkout_step
      - &download_dist_step
        name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # Pinned v4
        with:
          name: dist-artifacts
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # Pinned v2
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/etlplus/
    steps:
      - *checkout_step
      - *download_dist_step
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # Pinned v1
        with:
          verbose: true

  publish-docs:
    name: Publish docs to Read the Docs
    runs-on: ubuntu-latest
    needs: publish
    permissions: {}
    steps:
      - name: Sync and trigger Read the Docs release build
        env:
          READTHEDOCS_PROJECT_SLUG: ${{ vars.READTHEDOCS_PROJECT_SLUG }}
          READTHEDOCS_TOKEN: ${{ secrets.READTHEDOCS_TOKEN }}
          READTHEDOCS_VERSION_SLUG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${READTHEDOCS_PROJECT_SLUG}" ]; then
            echo 'Missing repository variable READTHEDOCS_PROJECT_SLUG' >&2
            exit 1
          fi
          if [ -z "${READTHEDOCS_TOKEN}" ]; then
            echo 'Missing repository secret READTHEDOCS_TOKEN' >&2
            exit 1
          fi

          api_base="https://app.readthedocs.com/api/v3/projects/${READTHEDOCS_PROJECT_SLUG}"
          version_url="${api_base}/versions/${READTHEDOCS_VERSION_SLUG}/"
          auth_header="Authorization: Token ${READTHEDOCS_TOKEN}"

          curl --fail --silent --show-error \
            -X POST \
            -H "${auth_header}" \
            "${api_base}/sync-versions/"

          for attempt in $(seq 1 12); do
            status_code="$(
              curl --silent --show-error \
                --output /tmp/readthedocs-version.json \
                --write-out '%{http_code}' \
                -H "${auth_header}" \
                "${version_url}"
            )"
            if [ "${status_code}" = '200' ]; then
              break
            fi
            if [ "${attempt}" -eq 12 ]; then
              echo "Read the Docs version ${READTHEDOCS_VERSION_SLUG} was not available after sync." >&2
              if [ -s /tmp/readthedocs-version.json ]; then
                cat /tmp/readthedocs-version.json >&2
              fi
              exit 1
            fi
            sleep 5
          done

          if grep -q '"active":[[:space:]]*true' /tmp/readthedocs-version.json \
            && grep -q '"hidden":[[:space:]]*false' /tmp/readthedocs-version.json; then
            curl --fail --silent --show-error \
              -X POST \
              -H "${auth_header}" \
              "${version_url}builds/"
          else
            curl --fail --silent --show-error \
              -X PATCH \
              -H "${auth_header}" \
              -H 'Content-Type: application/json' \
              -d '{"active": true, "hidden": false}' \
              "${version_url}"
          fi
