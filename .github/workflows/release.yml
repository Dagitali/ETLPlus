# release.yml
# ETLPlus
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# A GitHub Actions workflow for tagged release distribution.
#
# Responsibilities
# - Build, audit, validate, and smoke-test tagged distribution artifacts.
# - Publish the tagged GitHub Release and publish the package to PyPI.
# - Validate the tagged documentation build locally; hosted publication is
#   handled by the Read the Docs GitHub App.
#
# Maintainer Notes
# - GitHub Release note categories are configured separately in
#   `.github/release.yml`.
# - Python Package Index (PyPI trusted publishing must be configured for
#   `.github/workflows/release.yml` and the `pypi` GitHub environment.
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce
#   supply-chain risk.

---

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions: {}

jobs:
  build:
    name: Build tagged distributions
    runs-on: ubuntu-latest
    permissions: &permissions_read
      contents: read
    steps:
      - &checkout_step
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: 'build twine'
      - name: Build distributions
        run: |
          python -m build
      - name: Audit release artifacts
        run: |
          python tools/check_release_artifacts.py dist/*
      - name: Validate distributions
        run: |
          python -m twine check dist/*
      - name: Smoke-test wheel install
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --upgrade pip
          .wheel-venv/bin/python -m pip install dist/*.whl
          .wheel-venv/bin/etlplus --version
      - name: Upload distributions
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # Pinned v7.0.0
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - *checkout_step
      - &download_dist_step
        name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # Pinned v8.0.1
        with:
          name: dist-artifacts
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a  # Pinned v2.5.3
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      # Keep this environment name aligned with the PyPI trusted publisher.
      name: pypi
      url: https://pypi.org/project/etlplus/
    steps:
      - *checkout_step
      - *download_dist_step
      - name: Publish to PyPI
        # PyPI must trust `.github/workflows/release.yml`, not `ci.yml`.
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # Pinned v1
        with:
          verbose: true

  document:
    name: Build docs (${{ matrix.builder }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        builder: [html, epub]
    permissions: *permissions_read
    steps:
      - *checkout_step
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: '3.13'
          python-bootstrap: "-e .[docs]"
      - name: Build Sphinx docs
        run: |
          find docs/source/api/generated -type f -name '*.rst' -delete 2>/dev/null || true
          rm -rf docs/build/${{ matrix.builder }} docs/build/doctrees/${{ matrix.builder }}
          python -m sphinx -T -W --keep-going \
            -b ${{ matrix.builder }} \
            -d docs/build/doctrees/${{ matrix.builder }} \
            docs/source \
            docs/build/${{ matrix.builder }}
