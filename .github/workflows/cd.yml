# cd.yml
# ETLPlus
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# A GitHub Actions workflow for continuous distribution (CD) via tagged
# releases.
#
# Responsibilities
# - Build, audit, validate, and smoke-test tagged distribution artifacts,
#   including supported installer checks for the built wheel artifact.
# - Publish the tagged GitHub Release before publishing the package to PyPI.
# - Validate the tagged documentation build locally; hosted publication is
#   handled by the Read the Docs GitHub App.
#
# Maintainer Notes
# - GitHub Release note categories are configured separately in
#   `.github/release.yml`.
# - The GitHub Release is the earlier developer-preview and announcement
#   surface; PyPI is the later public package-install channel.
# - Python Package Index (PyPI) trusted publishing must be configured for
#   `.github/workflows/cd.yml` and the `pypi` GitHub environment.
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce
#   supply-chain risk.
# - The dynamic run name is part of the workflow contract: it should identify
#   the tagged version for release clarity.
#
# References
# - GitHub Actions Python packaging guide: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-python-packages-to-pypi
# - PyPI trusted publishing guide: https://docs.github.com/en/actions/deployment/publishing-to-pypi#about-pypi-trusted-publishing
# - GitHub environment configuration reference: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment
# - GitHub Actions expressions reference: https://docs.github.com/en/actions/learn-github-actions/expressions
# - GitHub Actions security hardening guide: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# - GitHub Actions workflow syntax reference: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# - GitHub Release documentation: https://docs.github.com/en/repositories/releasing-projects
# - Python packaging documentation: https://packaging.python.org/

---

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions: {}

env:
  DEFAULT_PYTHON_VERSION: '3.13'

jobs:
  build:
    name: Build tagged distributions
    runs-on: ubuntu-latest
    permissions: &permissions_read
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - uses: Dagitali/python-project-lifecycle@3830839be6caca98cacca702c5aa38805c4fb516  # Pinned v0.1.2
        with:
          phase: build-upload
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          release-artifact-audit-command: python tools/check_release_artifacts.py dist/*
          behavior-smoke-command: '{python} tools/smoke_test_schema_validation.py {python}'
          command-name: etlplus
          installer-smoke-installers: pip,pipx,uv
          package-name: etlplus
          smoke-commands: |
            etlplus --version
            etlplus --help
            etlplus check --help
            etlplus ui --help

  document:
    name: Build docs (${{ matrix.builder }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        builder: [html, epub]
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - uses: Dagitali/python-project-lifecycle@3830839be6caca98cacca702c5aa38805c4fb516  # Pinned v0.1.2
        with:
          phase: docs
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          docs-builder: ${{ matrix.builder }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build, document]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - &download_dist_step
        uses: ./.github/actions/download-dist-artifacts
      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # Pinned v3.0.0
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, document, release]
    permissions:
      contents: read
      id-token: write
    environment:
      # Keep this environment name aligned with the PyPI trusted publisher.
      name: pypi
      url: https://pypi.org/project/etlplus/
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - *download_dist_step
      - name: Publish to PyPI
        # PyPI must trust `.github/workflows/cd.yml`.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # Pinned v1.14.0
        with:
          verbose: true
