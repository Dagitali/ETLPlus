#
# GitHub Actions workflow for required pull-request (PR) gates.
#
# Responsibilities
# - Run required pull-request and merge-queue integration gates: linting,
#   docstring linting, type-checking, tests, and docs builds.
# - Run the lightweight baseline on GitFlow branches so working-branch pushes
#   get fast remote feedback before a PR is opened.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
# - Heavier protected-branch validation lives in `ci.yml`; keep this workflow
#   focused on the faster required baseline used by branch protection.
# - The dynamic run name is part of the workflow contract: it should identify
#   the short-lived source branch and the long-running target branch for PR
#   review clarity.
#
# References
# - Commitizen: https://commitizen-tools.github.io/commitizen/
# - GitHub Actions documentation: https://docs.github.com/en/actions
# - GitHub Actions for Python: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
# - GitHub Actions for Python packaging: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-python-packages-to-pypi
# - GitHub Actions metadata: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
# - GitHub Actions expressions: https://docs.github.com/en/actions/learn-github-actions/expressions
# - GitHub Actions best practices: https://docs.github.com/en/actions/learn-github-actions/introduction-to-github-actions#best-practices-for-github-actions
# - GitHub Actions security hardening: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# - GitHub Actions workflow commands: https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions
# - GitHub Actions workflow syntax: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# - GitHub pull request documentation: https://docs.github.com/en/pull-requests
# - GitHub merge queue documentation: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/configuring-merge-queues
# - Pre-commit hooks: https://pre-commit.com/
# - Python wheel installer documentation: https://pip.pypa.io/en/stable/reference/pip_install/#wheel-installer
# - Python wheel installation troubleshooting: https://pip.pypa.io/en/stable/topics/wheel/#installing-wheel-files
# - Python wheel installation troubleshooting for Linux: https://pip.pypa.io/en/stable/topics/wheel/#installing-wheel-files-on-linux
# - Python wheel installation troubleshooting for macOS: https://pip.pypa.io/en/stable/topics/wheel/#installing-wheel-files-on-macos
# - Python wheel installation troubleshooting for Windows: https://pip.pypa.io/en/stable/topics/wheel/#installing-wheel-files-on-windows
# - Python packaging and distribution: https://packaging.python.org/
# - Python wheel documentation: https://packaging.python.org/en/latest/specifications/binary-distribution-format/#file-contents
# - Read the Docs documentation: https://docs.readthedocs.io/en/stable/
# - Sphinx documentation: https://www.sphinx-doc.org/en/master/
# - Sphinx builders: https://www.sphinx-doc.org/en/master/usage/builders/index.html

---

name: PR Gates

run-name: >-
  ${{
    github.event_name == 'pull_request' &&
    format('PR Gates: {0} -> {1}', github.head_ref, github.base_ref) ||
    github.event_name == 'push' &&
    format('PR Gates: push on {0}', github.ref_name) ||
    github.event_name == 'merge_group' &&
    format('PR Gates: merge queue for {0}', github.ref_name) ||
    'PR Gates'
  }}

on:
  push:
    branches:
      # Protected and release-oriented GitFlow branches
      - main
      - develop
      - '**/release/**'
      - '**/hotfix/**'

      # GitFlow working branches
      - '**/feature/**'
      - '**/bugfix/**'

      # Extended working branches
      - '**/chore/**'
      - '**/ci/**'
      - '**/docs/**'
  pull_request:
    branches: [ main, develop ]
  merge_group:
    branches: [ main, develop ]

permissions: {}

env:
  DEFAULT_PYTHON_VERSION: '3.13'
  # Keep this width aligned with .ruff.toml:line-length.
  PY_LINE_LENGTH: '88'

jobs:
  pr-target-guard:
    name: Guard PR target branch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read
    steps:
      - name: Enforce GitFlow PR target rules
        shell: bash
        run: |
          if [[ '${{ github.event_name }}' == 'merge_group' ]]; then
            echo 'Merge group event inherits PR target validation from the queued pull requests.'
            exit 0
          fi

          head_ref='${{ github.head_ref }}'
          base_ref='${{ github.base_ref }}'

          echo "head_ref=$head_ref"
          echo "base_ref=$base_ref"

          if [[ "$base_ref" == 'main' ]]; then
            if [[ "$head_ref" == hotfix/* || "$head_ref" == release/* ]]; then
              echo 'PR target is valid for main.'
              exit 0
            fi

            echo 'Only release/* and hotfix/* branches may target main.'
            exit 1
          fi

          if [[ "$base_ref" == 'develop' && "$head_ref" == feature/* ]]; then
            echo 'Feature branch PR target is valid for develop.'
            exit 0
          fi

          echo 'No GitFlow target-branch restriction matched for this PR target.'

  lint:
    name: Lint on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy: &python-matrix
      matrix:
        python-version: ['3.13', '3.14']
    permissions: &permissions_read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ matrix.python-version }}
          python-bootstrap: ".[dev]"
      - name: Ruff check
        run: |
          ruff version
          ruff check .
          # ruff format --check .
          files="$(git ls-files '*.py')"
          if [ -n "$files" ]; then
            autopep8 --diff --exit-code --max-line-length=${PY_LINE_LENGTH} $files
          fi

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy: *python-matrix
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ matrix.python-version }}
          python-bootstrap: "-e .[dev,file]"
      - name: Run meta guardrails
        run: |
          pytest -q \
            tests/meta/test_m_test_layout.py \
            tests/meta/test_m_test_filenames.py \
            tests/meta/test_m_marker_coverage.py \
            tests/meta/test_m_integration_file_conventions.py \
            tests/meta/test_m_contract_readme.py
      - name: Run tests (with coverage)
        run: |
          pytest -q \
            -m "not perf" \
            --cov \
            --cov-branch \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            tests/
      - name: Upload coverage reports to Codecov
        if: github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # Pinned v6.0.1
        with:
          fail_ci_if_error: true
          files: coverage.xml
          flags: unit
          name: etlplus
          token: ${{ secrets.CODECOV_TOKEN }}  # Omit for public repo
          verbose: true

  doclint:
    name: Doclint on Python 3.13
    runs-on: ubuntu-latest
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          python-bootstrap: "-e .[dev,file]"
      - name: Run pydocstyle
        run: |
          find etlplus -type f -name '*.py' \
            ! -path '*/__pycache__/*' \
            -print0 | xargs -0 pydocstyle
      - name: Run pydoclint
        run: |
          pydoclint --style numpy \
            --exclude 'config_DEFUNCT|database_DEFUNCT' \
            etlplus

  typecheck:
    name: Type-check on Python 3.13
    runs-on: ubuntu-latest
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/python-bootstrap
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          python-bootstrap: "-e .[dev,file]"
      - name: Run mypy
        run: |
          mypy --version
          mypy etlplus

  document:
    name: Build docs (${{ matrix.builder }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        builder: [html]
    permissions: *permissions_read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      - uses: ./.github/actions/build-docs-target
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          builder: ${{ matrix.builder }}
