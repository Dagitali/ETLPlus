#
# Composite GitHub Action for repository checkout plus Python bootstrap.
#
# Responsibilities
# - Check out the requested repository ref.
# - Install the requested Python runtime.
# - Upgrade pip and install the requested dependency set.
#
# Maintainer Notes
# - This action exists to keep workflow jobs declarative by centralizing the
#   repeated checkout-plus-bootstrap sequence in one place.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.

---

name: Checkout And Bootstrap Python

description: >-
  Checks out the requested ref, installs the requested Python runtime, upgrades
  pip, and installs the provided dependency list.

inputs:
  fetch-depth:
    description: Fetch depth passed to actions/checkout
    required: false
    default: '0'
  python-version:
    description: Python version to install via actions/setup-python
    required: true
  python-bootstrap:
    description: Arguments passed to "pip install"
    required: true
  ref:
    description: Optional git ref to check out
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Pinned v6.0.2
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        ref: ${{ inputs.ref }}

    - uses: ./.github/actions/python-bootstrap
      with:
        python-version: ${{ inputs.python-version }}
        python-bootstrap: ${{ inputs.python-bootstrap }}
