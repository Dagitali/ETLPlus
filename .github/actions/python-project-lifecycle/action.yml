#
# Composite GitHub Action for common Python project lifecycle phases.
#
# Responsibilities
# - Route a workflow step to one Python project lifecycle phase.
# - Reuse local lifecycle actions where they already centralize behavior.
# - Keep workflow-level topology, permissions, matrices, and environments in
#   the calling workflow.
#
# Maintainer Notes
# - This action intentionally standardizes step behavior, not whole workflows.
# - Release workflows must still preserve distribution build, twine validation,
#   and built-wheel smoke coverage unless the release checklist changes.
#
# References
# - GitHub composite action guide: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
# - GitHub Actions metadata reference: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions

---

name: Python Project Lifecycle

description: >-
  Runs a selected Python project lifecycle phase for setup, linting,
  formatting checks, tests, docs, SBOM generation, distribution builds,
  artifact handling, security checks, deployment hooks, and package smoke
  validation.

inputs:
  phase:
    description: >-
      Lifecycle phase to run: bootstrap, lint, format-check, test, typecheck,
      doclint, docs, sbom, security, build, build-upload, upload-dist,
      download-dist, wheel-smoke, installer-smoke, or deploy.
    required: true

  python-version:
    description: Python version to install via actions/setup-python.
    required: false
    default: '3.13'
  pip-install:
    description: Arguments passed to "python -m pip install".
    required: false
    default: ''
  pip-version:
    description: Exact pip version to install instead of upgrading to latest.
    required: false
    default: ''
  upgrade-pip:
    description: Upgrade pip to latest unless pip-version is set.
    required: false
    default: 'true'
  working-directory:
    description: Directory where shell commands should run.
    required: false
    default: '.'

  ruff-args:
    description: Arguments passed to ruff for the lint phase.
    required: false
    default: 'check .'
  format-check-command:
    description: Command run by the format-check phase.
    required: false
    default: ''
  meta-test-command:
    description: Optional command run before pytest-args in the test phase.
    required: false
    default: ''
  pytest-args:
    description: Arguments passed to pytest for the test phase.
    required: false
    default: '-q tests/'
  typecheck-command:
    description: Command run by the typecheck phase.
    required: false
    default: 'mypy .'
  doclint-command:
    description: Command run by the doclint phase.
    required: false
    default: ''
  security-command:
    description: Command run by the security phase.
    required: false
    default: ''

  docs-builder:
    description: Sphinx builder used by the docs phase.
    required: false
    default: 'html'
  docs-pip-install:
    description: Arguments passed to python-bootstrap's pip-install input for docs dependencies.
    required: false
    default: '-e .[docs]'

  build-command:
    description: Command used by the build phase to build distributions.
    required: false
    default: 'python -m build'
  release-artifact-audit-command:
    description: Optional command used by the build phase to audit artifacts.
    required: false
    default: ''
  twine-check:
    description: Run "python -m twine check" in the build phase.
    required: false
    default: 'true'
  build-pip-install:
    description: Arguments passed to python-bootstrap's pip-install input for build dependencies.
    required: false
    default: 'build twine'
  skip-installer-smoke:
    description: Skip installer smoke tests during the build-upload phase.
    required: false
    default: 'false'
  skip-wheel-smoke:
    description: Skip wheel behavior smoke tests during the build-upload phase.
    required: false
    default: 'false'
  skip-artifact-upload:
    description: Skip distribution artifact upload during the build-upload phase.
    required: false
    default: 'false'
  dist-glob:
    description: Glob or path expression used to select built distributions.
    required: false
    default: dist/*
  artifact-name:
    description: Artifact name used when uploading or downloading distributions.
    required: false
    default: dist-artifacts
  artifact-path:
    description: Destination path for downloaded artifacts.
    required: false
    default: dist

  sbom-tool-version:
    description: CycloneDX tool version installed by the sbom phase.
    required: false
    default: '7.2.2'
  sbom-output-file:
    description: SBOM output path.
    required: false
    default: sbom.json
  sbom-output-format:
    description: SBOM output format.
    required: false
    default: JSON
  sbom-command:
    description: Optional custom command run by the sbom phase instead.
    required: false
    default: ''

  wheel-glob:
    description: Glob or path for the built wheel artifact used by smoke tests.
    required: false
    default: dist/*.whl
  smoke-venv-path:
    description: Virtual environment path used by wheel-smoke.
    required: false
    default: .wheel-venv
  behavior-smoke-command:
    description: >-
      Command run after installing the wheel in wheel-smoke. Use "{python}" as
      a placeholder for the smoke-test Python interpreter.
    required: false
    default: ''
  command-name:
    description: Command expected to be available on PATH after installing the wheel artifact.
    required: false
    default: ''
  smoke-commands:
    description: Newline-separated commands run by installer-smoke.
    required: false
    default: ''
  installer-smoke-installers:
    description: 'Comma-separated installers to smoke-test: pip,pipx,uv.'
    required: false
    default: 'pip,pipx,uv'
  package-name:
    description: Package name used by installer-smoke for cleanup when needed.
    required: false
    default: ''

  deploy-command:
    description: Command run by the deploy phase.
    required: false
    default: ''

outputs:
  python-version:
    description: Resolved Python version.
    value: ${{ steps.lifecycle-outputs.outputs.python-version }}
  pip-version:
    description: Resolved pip version.
    value: ${{ steps.lifecycle-outputs.outputs.pip-version }}
  dist-path:
    description: Distribution artifact path or glob used for upload and validation.
    value: ${{ inputs.dist-glob }}
  artifact-path:
    description: Destination path used when downloading distribution artifacts.
    value: ${{ inputs.artifact-path }}
  artifact-name:
    description: Uploaded or downloaded artifact name.
    value: ${{ inputs.artifact-name }}
  wheel-path:
    description: Wheel artifact path or glob used by smoke tests.
    value: ${{ inputs.wheel-glob }}
  docs-output-dir:
    description: Built documentation output directory.
    value: docs/build/${{ inputs.docs-builder }}
  sbom-path:
    description: Generated SBOM path.
    value: ${{ inputs.sbom-output-file }}
  coverage-file:
    description: Default coverage report path.
    value: coverage.xml

runs:
  using: composite
  steps:
    - name: Validate lifecycle phase
      shell: bash
      env:
        PHASE: ${{ inputs.phase }}
        SKIP_ARTIFACT_UPLOAD: ${{ inputs.skip-artifact-upload }}
        SKIP_INSTALLER_SMOKE: ${{ inputs.skip-installer-smoke }}
        SKIP_WHEEL_SMOKE: ${{ inputs.skip-wheel-smoke }}
        BEHAVIOR_SMOKE_COMMAND: ${{ inputs.behavior-smoke-command }}
        COMMAND_NAME: ${{ inputs.command-name }}
        SMOKE_COMMANDS: ${{ inputs.smoke-commands }}
      run: |
        set -euo pipefail

        case "$PHASE" in
          bootstrap|lint|format-check|test|typecheck|doclint|docs|sbom|security|build|build-upload|upload-dist|download-dist|wheel-smoke|installer-smoke|deploy)
            ;;
          *)
            echo "Unsupported lifecycle phase: $PHASE" >&2
            exit 2
            ;;
        esac

        for boolean_input in \
          "skip-artifact-upload=$SKIP_ARTIFACT_UPLOAD" \
          "skip-installer-smoke=$SKIP_INSTALLER_SMOKE" \
          "skip-wheel-smoke=$SKIP_WHEEL_SMOKE"; do
          case "${boolean_input#*=}" in
            true|false)
              ;;
            *)
              echo "${boolean_input%%=*} must be \"true\" or \"false\"." >&2
              exit 2
              ;;
          esac
        done

        wheel_smoke_required=false
        if [[ "$PHASE" == 'wheel-smoke' ]]; then
          wheel_smoke_required=true
        elif [[ "$PHASE" == 'build-upload' && "$SKIP_WHEEL_SMOKE" != 'true' ]]; then
          wheel_smoke_required=true
        fi

        if [[ "$wheel_smoke_required" == 'true' ]]; then
          if [[ -z "$BEHAVIOR_SMOKE_COMMAND" ]]; then
            echo 'behavior-smoke-command is required unless skip-wheel-smoke is "true".' >&2
            exit 2
          fi
        fi

        installer_smoke_required=false
        if [[ "$PHASE" == 'installer-smoke' ]]; then
          installer_smoke_required=true
        elif [[ "$PHASE" == 'build-upload' && "$SKIP_INSTALLER_SMOKE" != 'true' ]]; then
          installer_smoke_required=true
        fi

        if [[ "$installer_smoke_required" == 'true' ]]; then
          if [[ -z "$COMMAND_NAME" ]]; then
            echo 'command-name is required unless skip-installer-smoke is "true".' >&2
            exit 2
          fi
          if [[ -z "$SMOKE_COMMANDS" ]]; then
            echo 'smoke-commands is required unless skip-installer-smoke is "true".' >&2
            exit 2
          fi
        fi

    - name: Bootstrap Python
      if: >-
        inputs.phase == 'bootstrap' ||
        inputs.phase == 'lint' ||
        inputs.phase == 'format-check' ||
        inputs.phase == 'test' ||
        inputs.phase == 'typecheck' ||
        inputs.phase == 'doclint' ||
        inputs.phase == 'sbom' ||
        inputs.phase == 'security' ||
        inputs.phase == 'wheel-smoke' ||
        inputs.phase == 'installer-smoke' ||
        inputs.phase == 'deploy'
      uses: Dagitali/python-bootstrap@59ee536ff38521ef34f135b64557194bb0762078  # Pinned v0.1.1
      with:
        python-version: ${{ inputs.python-version }}
        pip-install: ${{ inputs.pip-install }}
        pip-version: ${{ inputs.pip-version }}
        upgrade-pip: ${{ inputs.upgrade-pip }}

    - name: Bootstrap build dependencies
      if: inputs.phase == 'build' || inputs.phase == 'build-upload'
      uses: Dagitali/python-bootstrap@59ee536ff38521ef34f135b64557194bb0762078  # Pinned v0.1.1
      with:
        python-version: ${{ inputs.python-version }}
        pip-install: ${{ inputs.build-pip-install }}
        pip-version: ${{ inputs.pip-version }}
        upgrade-pip: ${{ inputs.upgrade-pip }}

    - name: Lint with Ruff
      if: inputs.phase == 'lint'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RUFF_ARGS: ${{ inputs.ruff-args }}
      run: |
        set -euo pipefail

        ruff version
        ruff $RUFF_ARGS

    - name: Check formatting
      if: inputs.phase == 'format-check'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND_INPUT_NAME: format-check-command
        COMMAND_VALUE: ${{ inputs.format-check-command }}
        PHASE: ${{ inputs.phase }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/run-command.sh"

    - name: Run tests
      if: inputs.phase == 'test'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        META_TEST_COMMAND: ${{ inputs.meta-test-command }}
        PYTEST_ARGS: ${{ inputs.pytest-args }}
      run: |
        set -euo pipefail

        if [[ -n "$META_TEST_COMMAND" ]]; then
          eval "$META_TEST_COMMAND"
        fi

        pytest $PYTEST_ARGS

    - name: Type-check
      if: inputs.phase == 'typecheck'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND_INPUT_NAME: typecheck-command
        COMMAND_VALUE: ${{ inputs.typecheck-command }}
        PHASE: ${{ inputs.phase }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/run-command.sh"

    - name: Doclint
      if: inputs.phase == 'doclint'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND_INPUT_NAME: doclint-command
        COMMAND_VALUE: ${{ inputs.doclint-command }}
        PHASE: ${{ inputs.phase }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/run-command.sh"

    - name: Build docs
      if: inputs.phase == 'docs'
      uses: ./.github/actions/build-docs-target
      with:
        builder: ${{ inputs.docs-builder }}
        python-version: ${{ inputs.python-version }}
        pip-install: ${{ inputs.docs-pip-install }}

    - name: Generate SBOM
      if: inputs.phase == 'sbom'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SBOM_COMMAND: ${{ inputs.sbom-command }}
        SBOM_OUTPUT_FILE: ${{ inputs.sbom-output-file }}
        SBOM_OUTPUT_FORMAT: ${{ inputs.sbom-output-format }}
        SBOM_TOOL_VERSION: ${{ inputs.sbom-tool-version }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/generate-sbom.sh"

    - name: Security check
      if: inputs.phase == 'security'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND_INPUT_NAME: security-command
        COMMAND_VALUE: ${{ inputs.security-command }}
        PHASE: ${{ inputs.phase }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/run-command.sh"

    - name: Build distributions
      if: inputs.phase == 'build' || inputs.phase == 'build-upload'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BUILD_COMMAND: ${{ inputs.build-command }}
        DIST_GLOB: ${{ inputs.dist-glob }}
        RELEASE_ARTIFACT_AUDIT_COMMAND: ${{ inputs.release-artifact-audit-command }}
        TWINE_CHECK: ${{ inputs.twine-check }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/build-distributions.sh"

    - name: Download distributions
      if: inputs.phase == 'download-dist'
      uses: ./.github/actions/download-dist-artifacts
      with:
        artifact-name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}

    - name: Smoke-test wheel behavior
      if: >-
        inputs.phase == 'wheel-smoke' ||
        (inputs.phase == 'build-upload' && inputs.skip-wheel-smoke != 'true')
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BEHAVIOR_SMOKE_COMMAND: ${{ inputs.behavior-smoke-command }}
        SMOKE_VENV_PATH: ${{ inputs.smoke-venv-path }}
        WHEEL_GLOB: ${{ inputs.wheel-glob }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/wheel-smoke.sh"

    - name: Smoke-test supported installers
      if: >-
        inputs.phase == 'installer-smoke' ||
        (inputs.phase == 'build-upload' && inputs.skip-installer-smoke != 'true')
      uses: Dagitali/python-installer-smoke@25e584bb42ea30f99dbef0fed0ff4077d4f1ae36  # Pinned v0.1.1
      with:
        artifact-wheel: ${{ inputs.wheel-glob }}
        command-name: ${{ inputs.command-name }}
        installer-smoke-installers: ${{ inputs.installer-smoke-installers }}
        package-name: ${{ inputs.package-name }}
        smoke-commands: ${{ inputs.smoke-commands }}
        venv-path: ${{ inputs.smoke-venv-path }}

    - name: Upload distributions
      if: >-
        inputs.phase == 'upload-dist' ||
        (inputs.phase == 'build-upload' && inputs.skip-artifact-upload != 'true')
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # Pinned v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.dist-glob }}
        if-no-files-found: error

    - name: Deploy
      if: inputs.phase == 'deploy'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND_INPUT_NAME: deploy-command
        COMMAND_VALUE: ${{ inputs.deploy-command }}
        PHASE: ${{ inputs.phase }}
      run: |
        set -euo pipefail

        bash "${GITHUB_ACTION_PATH}/scripts/run-command.sh"

    - name: Capture lifecycle outputs
      id: lifecycle-outputs
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "python-version=$(python --version 2>/dev/null || true)"
          echo "pip-version=$(python -m pip --version 2>/dev/null || true)"
        } >> "$GITHUB_OUTPUT"
