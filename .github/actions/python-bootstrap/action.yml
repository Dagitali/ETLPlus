#
# Composite GitHub Action for Python bootstrap in Python project workflows.
#
# Responsibilities
# - Install the requested Python runtime.
# - Upgrade pip and install the requested dependency set for the calling job.
#
# Maintainer Notes
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.

---

name: Setup Python and Install Dependencies

description: >-
  Sets up the requested Python runtime, upgrades pip, and installs the provided
  dependency list to keep workflow jobs consistent.

inputs:
  python-version:
    description: Python version to install via actions/setup-python
    required: true
  python-bootstrap:
    description: Arguments passed to "pip install"
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # Pinned v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      shell: bash
      run: pip install ${{ inputs.python-bootstrap }}
