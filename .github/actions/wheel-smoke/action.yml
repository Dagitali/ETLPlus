#
# Composite GitHub Action for package-behavior wheel smoke testing.
#
# Responsibilities
# - Create an isolated virtual environment for a built wheel artifact.
# - Run the schema-validation smoke checks against the installed package.
#
# Maintainer Notes
# - This action is intentionally release-oriented: it verifies the packaged
#   artifact rather than the checked-out editable workspace.
#
# References
# - GitHub Actions metadata: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions

---

name: Smoke-Test Built Wheel Behavior

description: >-
  Creates an isolated virtual environment, installs the built ETLPlus wheel
  artifact, and runs schema-validation smoke checks.

inputs:
  artifact-wheel:
    description: Glob or path for the built wheel artifact passed to pip install
    required: false
    default: dist/*.whl
  venv-path:
    description: >-
      Path to the temporary virtual environment used for smoke testing
    required: false
    default: .wheel-venv

runs:
  using: composite
  steps:
    - name: Smoke-test wheel install
      shell: bash
      run: |
        python -m venv "${{ inputs.venv-path }}"
        "${{ inputs.venv-path }}/bin/python" -m pip install --upgrade pip
        smoke_python="${{ inputs.venv-path }}/bin/python"
        "$smoke_python" -m pip install ${{ inputs.artifact-wheel }}
        "$smoke_python" tools/smoke_test_schema_validation.py "$smoke_python"
