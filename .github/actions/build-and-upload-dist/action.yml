#
# Composite GitHub Action for building, validating, smoke-testing, and
# uploading distributions from a checked-out workspace.
#
# Responsibilities
# - Install the requested Python runtime and build dependency set.
# - Build and verify distributions from the checked-out repository.
# - Smoke-test supported installers and packaged behavior for the built wheel
#   artifact, then upload the resulting artifacts.
#
# Maintainer Notes
# - This action preserves the repository's release safeguards by composing the
#   existing distribution build, installer smoke, package-behavior smoke, and
#   artifact upload steps.
# - Workflow jobs must check out the repository before invoking this local
#   action.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
#
# References
# - GitHub composite action guide: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
# - GitHub Actions metadata reference: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions

---

name: Build And Upload Distributions

description: >-
  Installs build dependencies, builds ETLPlus distributions, validates them,
  smoke-tests supported installers and packaged behavior, and uploads the
  artifacts from the checked-out
  repository.

inputs:
  artifact-name:
    description: Artifact name used when uploading built distributions
    required: false
    default: dist-artifacts
  dist-glob:
    description: Glob or path expression used to select built distributions
    required: false
    default: dist/*
  python-version:
    description: Python version to install via actions/setup-python
    required: false
    default: '3.13'
  pip-install:
    description: Arguments passed to "python -m pip install" for build dependencies
    required: false
    default: 'build twine'
  build-command:
    description: Command used to build source and wheel distributions
    required: false
    default: python -m build
  artifact-wheel:
    description: Glob or path for the built wheel artifact used by smoke tests
    required: false
    default: dist/*.whl
  release-artifact-audit-command:
    description: Command used to audit built distribution artifacts
    required: false
    default: python tools/check_release_artifacts.py dist/*
  twine-check:
    description: Run "python -m twine check" against selected distributions
    required: false
    default: 'true'
  command-name:
    description: Command expected to be available on PATH after installing the wheel artifact
    required: false
    default: etlplus
  installer-smoke-installers:
    description: 'Comma-separated installers to smoke-test: pip,pipx,uv'
    required: false
    default: pip,pipx,uv
  package-name:
    description: Distribution package name used for installer cleanup
    required: false
    default: etlplus
  smoke-commands:
    description: Newline-separated commands run by supported installer smoke tests
    required: false
    default: |
      etlplus --version
      etlplus --help
      etlplus check --help
      etlplus ui --help

runs:
  using: composite
  steps:
    - uses: Dagitali/python-bootstrap@59ee536ff38521ef34f135b64557194bb0762078  # Pinned v0.1.1
      with:
        python-version: ${{ inputs.python-version }}
        pip-install: ${{ inputs.pip-install }}

    - name: Build distributions
      shell: bash
      env:
        BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -euo pipefail

        eval "$BUILD_COMMAND"

    - name: Audit distributions
      shell: bash
      env:
        RELEASE_ARTIFACT_AUDIT_COMMAND: ${{ inputs.release-artifact-audit-command }}
      run: |
        set -euo pipefail

        if [[ -z "$RELEASE_ARTIFACT_AUDIT_COMMAND" ]]; then
          echo 'Skipping release artifact audit.'
          exit 0
        fi

        eval "$RELEASE_ARTIFACT_AUDIT_COMMAND"

    - name: Validate distributions
      shell: bash
      env:
        DIST_GLOB: ${{ inputs.dist-glob }}
        TWINE_CHECK: ${{ inputs.twine-check }}
      run: |
        set -euo pipefail

        case "$TWINE_CHECK" in
          true)
            python -m twine check $DIST_GLOB
            ;;
          false)
            echo 'Skipping twine check.'
            ;;
          *)
            echo 'twine-check must be "true" or "false".' >&2
            exit 2
            ;;
        esac

    - uses: Dagitali/python-installer-smoke@25e584bb42ea30f99dbef0fed0ff4077d4f1ae36  # Pinned v0.1.1
      with:
        artifact-wheel: ${{ inputs.artifact-wheel }}
        command-name: ${{ inputs.command-name }}
        installer-smoke-installers: ${{ inputs.installer-smoke-installers }}
        package-name: ${{ inputs.package-name }}
        smoke-commands: ${{ inputs.smoke-commands }}

    - uses: ./.github/actions/wheel-smoke
      with:
        artifact-wheel: ${{ inputs.artifact-wheel }}

    - name: Upload distributions
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # Pinned v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.dist-glob }}
        if-no-files-found: error
