#
# Composite GitHub Action for building, validating, smoke-testing, and
# uploading distributions.
#
# Responsibilities
# - Check out the requested repository ref.
# - Build and verify distributions from the checked-out repository.
# - Smoke-test the built wheel and upload the resulting artifacts.
#
# Maintainer Notes
# - This action preserves the repository's release safeguards by composing the
#   existing distribution build, wheel smoke, and artifact upload steps.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.

---

name: Build And Upload Distributions

description: >-
  Checks out the requested ref, builds ETLPlus distributions, validates them,
  smoke-tests the wheel, and uploads the artifacts.

inputs:
  artifact-name:
    description: Artifact name used when uploading built distributions
    required: false
    default: dist-artifacts
  dist-glob:
    description: Glob or path expression used to select built distributions
    required: false
    default: dist/*
  python-version:
    description: Python version to install via actions/setup-python
    required: false
    default: '3.13'
  python-bootstrap:
    description: Arguments passed to "pip install" for build dependencies
    required: false
    default: 'build twine'
  ref:
    description: Optional git ref to check out
    required: false
    default: ''
  wheel-path:
    description: Glob or path passed to pip install for the built wheel
    required: false
    default: dist/*.whl

runs:
  using: composite
  steps:
    - uses: ./.github/actions/checkout-and-bootstrap
      with:
        python-version: ${{ inputs.python-version }}
        python-bootstrap: ${{ inputs.python-bootstrap }}
        ref: ${{ inputs.ref }}

    - uses: ./.github/actions/build-and-verify-dist
      with:
        dist-glob: ${{ inputs.dist-glob }}

    - uses: ./.github/actions/wheel-smoke
      with:
        wheel-path: ${{ inputs.wheel-path }}

    - name: Upload distributions
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # Pinned v7.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.dist-glob }}
        if-no-files-found: error
