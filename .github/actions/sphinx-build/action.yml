#
# Composite GitHub Action for building Sphinx documentation targets.
#
# Responsibilities
# - Clear generated API stubs and prior output for the selected builder.
# - Build a specific Sphinx builder target with warnings treated as errors.
#
# Maintainer Notes
# - Workflow jobs remain responsible for Python setup and docs dependency
#   installation before invoking this action.
#
# References
# - GitHub composite action guide: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
# - GitHub Actions metadata reference: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions

---

name: Build Sphinx Docs

description: >-
  Removes stale generated docs output and builds a selected Sphinx target.

inputs:
  builder:
    description: Sphinx builder to run, such as html, epub, or linkcheck
    required: true

runs:
  using: composite
  steps:
    - name: Build Sphinx docs
      shell: bash
      run: |
        find docs/source/api/generated \
          -type f \
          -name '*.rst' \
          -delete 2>/dev/null || true
        builder="${{ inputs.builder }}"
        rm -rf "docs/build/$builder" "docs/build/doctrees/$builder"
        python -m sphinx -T -W --keep-going \
          -b "$builder" \
          -d "docs/build/doctrees/$builder" \
          docs/source \
          "docs/build/$builder"
