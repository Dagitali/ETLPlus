#
# Composite GitHub Action for building and validating Python distributions.
#
# Responsibilities
# - Build source and wheel distributions from the checked-out repository.
# - Optionally run a caller-provided artifact audit command.
# - Optionally run `twine check` against the built distributions.
#
# Maintainer Notes
# - This action intentionally stops short of wheel smoke testing so workflows
#   can decide whether and how to run additional packaged-runtime checks.
#
# References
# - GitHub composite action guide: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
# - GitHub Actions metadata reference: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions

---

name: Build And Verify Distributions

description: >-
  Builds Python distributions and optionally validates the resulting artifacts
  with caller-provided audit logic and twine.

inputs:
  build-command:
    description: Command used to build source and wheel distributions
    required: false
    default: python -m build
  dist-glob:
    description: Glob or path expression used to select built distributions
    required: false
    default: dist/*
  release-artifact-audit-command:
    description: Optional command used to audit built distribution artifacts
    required: false
    default: ''
  twine-check:
    description: Run "python -m twine check" against selected distributions
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Build distributions
      shell: bash
      env:
        BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -euo pipefail

        eval "$BUILD_COMMAND"

    - name: Audit distributions
      shell: bash
      env:
        RELEASE_ARTIFACT_AUDIT_COMMAND: ${{ inputs.release-artifact-audit-command }}
      run: |
        set -euo pipefail

        if [[ -z "$RELEASE_ARTIFACT_AUDIT_COMMAND" ]]; then
          echo 'Skipping release artifact audit.'
          exit 0
        fi

        eval "$RELEASE_ARTIFACT_AUDIT_COMMAND"

    - name: Validate distributions
      shell: bash
      env:
        DIST_GLOB: ${{ inputs.dist-glob }}
        TWINE_CHECK: ${{ inputs.twine-check }}
      run: |
        set -euo pipefail

        case "$TWINE_CHECK" in
          true)
            python -m twine check $DIST_GLOB
            ;;
          false)
            echo 'Skipping twine check.'
            ;;
          *)
            echo 'twine-check must be "true" or "false".' >&2
            exit 2
            ;;
        esac
