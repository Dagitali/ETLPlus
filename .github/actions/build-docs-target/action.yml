#
# Composite GitHub Action for Sphinx documentation builds in a checked-out
# workspace.
#
# Responsibilities
# - Install the requested Python runtime and docs dependency set.
# - Build the selected Sphinx target with warnings treated as errors.
#
# Maintainer Notes
# - Workflow jobs must check out the repository before invoking this local
#   action.
# - This action intentionally composes `python-bootstrap` and `sphinx-build`
#   so workflow files can focus on orchestration rather than step wiring.

---

name: Build Docs Target

description: >-
  Installs docs dependencies and builds the selected Sphinx target in the
  checked-out repository.

inputs:
  builder:
    description: Sphinx builder to run, such as html, epub, or linkcheck
    required: true
  python-version:
    description: Python version to install via actions/setup-python
    required: false
    default: '3.13'
  python-bootstrap:
    description: Arguments passed to "pip install" for docs dependencies
    required: false
    default: '-e .[docs]'
runs:
  using: composite
  steps:
    - uses: ./.github/actions/python-bootstrap
      with:
        python-version: ${{ inputs.python-version }}
        python-bootstrap: ${{ inputs.python-bootstrap }}

    - uses: ./.github/actions/sphinx-build
      with:
        builder: ${{ inputs.builder }}
