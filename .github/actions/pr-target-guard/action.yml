#
# Composite GitHub Action for enforcing GitFlow pull-request target rules.
#
# Responsibilities
# - Reject feature branches targeting `main`.
# - Restrict `main` pull-request targets to `release/*` and `hotfix/*`.
#
# Maintainer Notes
# - Keep the policy logic here aligned with `.github/BRANCH-PROTECTION.md` and
#   `.github/MAINTAINER-RUNBOOKS.md` so documentation and enforcement do not
#   drift.
# - Merge queue events intentionally succeed without re-evaluating individual
#   branch mappings because the queued pull requests have already been checked.

---

name: Guard PR Target Branch

description: >-
  Enforces the repository's GitFlow pull-request target rules for protected
  branches.

inputs:
  base-ref:
    description: Pull request base branch name
    required: false
    default: ''
  event-name:
    description: GitHub event name
    required: true
  head-ref:
    description: Pull request head branch name
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Enforce GitFlow PR target rules
      shell: bash
      run: |
        if [[ '${{ inputs.event-name }}' == 'merge_group' ]]; then
          echo 'Merge group event inherits PR target validation from the queued pull requests.'
          exit 0
        fi

        head_ref='${{ inputs.head-ref }}'
        base_ref='${{ inputs.base-ref }}'

        echo "head_ref=$head_ref"
        echo "base_ref=$base_ref"

        if [[ "$base_ref" == 'main' ]]; then
          if [[ "$head_ref" == hotfix/* || "$head_ref" == release/* ]]; then
            echo 'PR target is valid for main.'
            exit 0
          fi

          echo 'Only release/* and hotfix/* branches may target main.'
          exit 1
        fi

        if [[ "$base_ref" == 'develop' && "$head_ref" == feature/* ]]; then
          echo 'Feature branch PR target is valid for develop.'
          exit 0
        fi

        echo 'No GitFlow target-branch restriction matched for this PR target.'
