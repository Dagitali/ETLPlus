#
# Composite GitHub Action for downloading built distribution artifacts.
#
# Responsibilities
# - Download a named distribution artifact bundle into the requested path.
#
# Maintainer Notes
# - This action keeps release-consumer jobs focused on publication logic rather
#   than repeating artifact download wiring.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.

---

name: Download Distribution Artifacts

description: >-
  Downloads a named distribution artifact bundle into the requested path.

inputs:
  artifact-name:
    description: Artifact name used when downloading built distributions
    required: false
    default: dist-artifacts
  path:
    description: Destination directory for the downloaded artifact bundle
    required: false
    default: dist

runs:
  using: composite
  steps:
    - name: Download distributions
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # Pinned v8.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.path }}
