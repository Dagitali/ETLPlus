# .ruff.toml
# ETLPlus
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# Ruff configuration.
#
# Responsibilities
# - Define the repository's Ruff linting and formatting policy for Python
#   sources.
# - Target the minimum supported syntax level: Python 3.13.
#
# Maintainer Notes
# - Keep Ruff fast and opinionated but not overbearing.
# - Avoid conflicts with the more specific docstring rules enforced by
#   pydocstyle/pydoclint in pyproject.toml.

line-length = 88  # Matches Ruff's default, popularized by Black.
target-version = "py313"
extend-exclude = [
  "etlplus.egg-info",
  "temp",
  "etlplus/*_DEFUNCT",
  "*_FIXED.py",
  "*_NEW.py",
  "*_ORIG.py",
]

[lint]
# Docstring enforcement is handled by pydocstyle/pydoclint in pyproject.toml.
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "B",   # flake8-bugbear
  "I",   # isort
  "UP",  # pyupgrade
]
preview = true
extend-select = [
  "E203",  # Enforce autopep8 slice spacing (no space before ':')
]

[lint.isort]
combine-as-imports = false
force-single-line = true

[lint.per-file-ignores]
# Keep doclint-compatible generic syntax until pydocstyle fully understands
# inline type parameters on public APIs.
'etlplus/utils/_graph.py' = ['UP047']

[format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"
