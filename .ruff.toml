#
# Ruff configuration.
#
# Target the minimum supported syntax level: Python 3.13. Keep it fast and
# opinionated but not overbearing. Avoid conflicts with the more specific rules
# enforced by pydocstyle/pydoclint in pyproject.toml.

line-length = 79  # 88 is Ruff's default, popularized by Black.
target-version = "py313"
extend-exclude = [
  "etlplus.egg-info",
  "temp",
  "etlplus/*_DEFUNCT",
  "*_FIXED.py",
  "*_NEW.py",
  "*_ORIG.py",
]

[lint]
# Docstring enforcement is handled by pydocstyle/pydoclint in pyproject.toml.
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "B",   # flake8-bugbear
  "I",   # isort
  "UP",  # pyupgrade
]
preview = true
extend-select = [
  "E203",  # Enforce autopep8 slice spacing (no space before ':')
]

[lint.isort]
combine-as-imports = false
force-single-line = true

[format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"
