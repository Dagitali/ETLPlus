# .readthedocs.yaml
# ETLPlus
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# Read the Docs configuration for hosted documentation builds.
#
# Responsibilities
# - Define the Read the Docs build environment and Python version.
# - Build the Sphinx documentation from docs/source/conf.py.
# - Install the package with documentation extras for hosted builds.
#
# Maintainer Notes
# - Keep the Python version aligned with the default release/docs CI runtime.
# - Keep hosted docs dependency installation aligned with pyproject.toml
#   extras.
# - Keep warning failures enabled so broken references do not publish silently.
#
# References
# - Read the Docs configuration reference: https://docs.readthedocs.io/en/stable/config-file/v2.html
# - Read the Docs reproducible builds guide: https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html

---

# Required.
version: 2

# Set the OS, Python version, & other tools needed for building docs.
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

# Optional: Build docs in additional formats.
formats:
  - epub

# Build docs in "docs/" directory with Sphinx.
sphinx:
  # Sphinx configuration file path.
  configuration: docs/source/conf.py
  # Fail on all warnings to avoid broken references.
  fail_on_warning: true

# Optional (recommended): Declare Python requirements required to build docs.
# See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
  install:
    # Install Python packages before building docs.
    - method: pip
      path: .
      extra_requirements:
        - docs
