#
# Read the Docs build configuration for the ETLPlus API reference.

---

# Required
version: 2

# Set the OS, Python version, & other tools needed for building the docs.
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

# Sphinx configuration file path.
sphinx:
  configuration: docs/conf.py

# Install the dependencies for building the docs.
python:
  install:
    - requirements: docs/requirements.txt
