#
# uv lockfile for the reproducible CI/development environment snapshot.
#
# Responsibilities
# - Record the resolved dependency graph for uv-managed development installs.
# - Preserve package versions, hashes, sources, extras, and platform markers.
# - Let CI verify that pyproject.toml metadata and the lockfile stay aligned.
#
# Maintainer Notes
# - Keep pyproject.toml as the canonical package metadata source.
# - Refresh this file with uv when pyproject.toml dependencies or extras change.
# - Release builds continue to use python -m build, twine check, and wheel smoke
#   validation rather than treating this file as package metadata.
#
# References
# - uv project synchronization: https://docs.astral.sh/uv/concepts/projects/sync/
# - uv lockfile documentation: https://docs.astral.sh/uv/concepts/projects/layout/#the-lockfile

version = 1
revision = 3
requires-python = ">=3.13, <3.15"
resolution-markers = [
    "python_full_version >= '3.14' and platform_machine == 'ARM64' and sys_platform == 'win32'",
    "python_full_version >= '3.14' and platform_machine != 'ARM64' and sys_platform == 'win32'",
    "python_full_version >= '3.14' and sys_platform == 'emscripten'",
    "python_full_version >= '3.14' and sys_platform != 'emscripten' and sys_platform != 'win32'",
    "python_full_version < '3.14' and platform_machine == 'ARM64' and sys_platform == 'win32'",
    "python_full_version < '3.14' and platform_machine != 'ARM64' and sys_platform == 'win32'",
    "python_full_version < '3.14' and sys_platform == 'emscripten'",
    "python_full_version < '3.14' and sys_platform != 'emscripten' and sys_platform != 'win32'",
]

